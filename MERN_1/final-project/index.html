<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Auditor</title>
  </head>
  <body>
    <div id="app">
      <h1>E-Commerce Inventory Auditor</h1>
      <p>TS + Prototypes + Async + DOM + Debounce/Throttle + Map/Set + Audits</p>

      <div class="panel">
        <input id="searchInput" placeholder="Search products..." />
        <button id="exportBtn">Export JSON</button>
        <button id="refreshBtn">Refresh</button>
        <div id="stats"></div>
      </div>

      <div class="panel">
        <h2>Bulk Edit (selected)</h2>
        <form id="bulkForm">
          <input id="bulkName" placeholder="New name (optional)" />
          <input id="bulkPrice" placeholder="New price (optional)" />
          <button type="submit">Apply</button>
        </form>
      </div>

      <div class="panel">
        <h2>Products</h2>
        <div id="grid" class="grid"></div>
        <p id="loadHint"></p>
      </div>

      <div class="panel">
        <h2>Audit Results</h2>
        <div id="auditTable"></div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
