<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 05 - Dynamic Form Validator SPA</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <h1>Task 05 - Dynamic Form Validator SPA</h1>

  <!-- Form -->
  <form id="taskForm">
    <input type="hidden" id="taskId" />

    <div class="row">
      <label>Title</label>
      <input id="titleInput" type="text" placeholder="Enter title" />
      <div class="error" id="titleError"></div>
    </div>

    <div class="row">
      <label>Email</label>
      <input id="emailInput" type="text" placeholder="name@example.com" />
      <div class="error" id="emailError"></div>
    </div>

    <div class="row">
      <label>Pattern (letters & spaces)</label>
      <input id="patternInput" type="text" placeholder="Ahmed Nadeem" />
      <div class="error" id="patternError"></div>
    </div>

    <div class="buttons">
      <button type="submit" id="submitBtn">Add</button>
      <button type="button" id="cancelBtn">Cancel</button>
    </div>
  </form>

  <!-- Search -->
  <div class="row">
    <label>Search</label>
    <input id="searchInput" type="text" placeholder="Search tasks..." />
  </div>

  <!-- Tasks -->
  <h2>Tasks</h2>
  <ul id="taskList"></ul>
  <p id="emptyState">No tasks yet.</p>

  <script src="./app.js"></script>
</body>
</html>
