<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 05 — Dynamic Form Validator SPA</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Dynamic Form Validator SPA</h1>
        <p class="muted">Pure DOM • Event delegation • Debounce • Throttle • localStorage</p>
      </header>

      <!-- FORM -->
      <section class="card">
        <h2>Add / Edit Task</h2>

        <form id="taskForm">
          <!-- hidden id for edit mode -->
          <input type="hidden" id="taskId" />

          <div class="grid">
            <label class="field">
              <span>Task Title</span>
              <input id="titleInput" type="text" placeholder="e.g., Learn DOM" />
              <small class="error" id="titleError"></small>
            </label>

            <label class="field">
              <span>Email (live validation)</span>
              <input id="emailInput" type="text" placeholder="e.g., name@example.com" />
              <small class="error" id="emailError"></small>
            </label>

            <label class="field">
              <span>Pattern (letters & spaces only)</span>
              <input id="patternInput" type="text" placeholder="e.g., Ahmed Nadeem" />
              <small class="error" id="patternError"></small>
            </label>
          </div>

          <div class="actions">
            <button id="submitBtn" type="submit">Add Task</button>
            <button id="cancelBtn" type="button" class="secondary">Cancel</button>
          </div>
        </form>

        <p class="hint">
          Resize the window to see throttled layout updates.
        </p>
      </section>

      <!-- LIST -->
      <section class="card">
        <div class="listHeader">
          <h2>Tasks</h2>
          <input id="searchInput" type="text" placeholder="Search tasks..." />
        </div>

        <ul id="taskList" class="taskList"></ul>

        <p id="emptyState" class="muted">No tasks yet. Add your first task.</p>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
